    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

      body {
        background-color: #FAF9F7;
        color: #17151F;
        font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
        word-break: keep-all;
      }

      h1, h2, h3 { text-wrap: balance; }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #FAF9F7; }
      ::-webkit-scrollbar-thumb { background: #D8D4CC; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #BEB9AF; }

      /* ============== Redesign v2 utilities ============== */
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(91,33,182,0.25); border-radius: 100px;
      }

      /* Scroll-progress bar (top) */
      .scroll-progress {
        position: fixed; top: 0; left: 0;
        height: 2px; width: 0%;
        background: #5B21B6;
        z-index: 60;
        transition: width 0.1s linear;
      }

      /* Reveal-on-scroll base */
      .reveal {
        opacity: 0;
        transform: translateY(28px);
        transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1),
                    transform 0.9s cubic-bezier(0.22,1,0.36,1);
        will-change: transform, opacity;
      }
      .reveal.is-visible { opacity: 1; transform: translateY(0); }
      .reveal.delay-1 { transition-delay: 0.1s; }
      .reveal.delay-2 { transition-delay: 0.2s; }
      .reveal.delay-3 { transition-delay: 0.3s; }
      .reveal.delay-4 { transition-delay: 0.4s; }

      /* Word reveal helper */
      .word-reveal {
        display: inline-block;
        opacity: 0;
        transform: translateY(40px);
        animation: revealWord 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
      }

      /* 3D tilt parent */
      .tilt-card {
        transform-style: preserve-3d;
        transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        will-change: transform;
      }

      /* 에디토리얼 액센트 텍스트 (구 grad-anim — 단색 딥퍼플) */
      .grad-anim {
        color: #5B21B6;
      }

      /* HUD frame corners — 라이트 테마에서 미사용 (호환용 무해 처리) */
      .hud-corner { display: none; }

      .scan-overlay::before { content: none; }

      /* Live dot */
      .live-dot {
        display: inline-block; width: 6px; height: 6px;
        border-radius: 50%; background: #22C55E;
        animation: pulse 1.5s ease-in-out infinite;
      }

      /* Ticker mono helper → 에디토리얼 오버라인 라벨 */
      .ticker {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        color: rgba(91, 33, 182, 0.75);
      }

      /* Reduce-motion respect */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }

  <script type="module" src="/index.tsx"></script>

  <!-- Global scroll-progress + reveal observer -->
  <script>
    // Scroll progress
    const bar = document.getElementById('scrollProgress');
    function updateScrollProgress() {
      const h = document.documentElement;
      const max = h.scrollHeight - h.clientHeight;
      const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;
      if (bar) bar.style.width = pct + '%';
    }
    window.addEventListener('scroll', updateScrollProgress, { passive: true });
    window.addEventListener('resize', updateScrollProgress);

    // Global IntersectionObserver for .reveal elements (re-scans for React renders)
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });

    function rescanReveals() {
      document.querySelectorAll('.reveal:not(.is-visible)').forEach(el => revealObserver.observe(el));
    }
    new MutationObserver(rescanReveals).observe(document.body, { childList: true, subtree: true });
    setTimeout(rescanReveals, 200);
    setTimeout(rescanReveals, 1000);
  </script>
